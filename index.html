  <!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DESPERTÁ — Bienvenido/a</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Raleway:wght@300;400;500&display=swap');
  :root{--ink:#0e0b09;--warm:#1a1410;--paper:#f7efe3;--cream:#ede3d4;--amber:#c8923a;--amber-l:#e8b86d;--amber-d:#8a6020;--muted:#7a6650;--line:rgba(200,146,58,0.22);--font-display:'Playfair Display','Georgia',serif;--font-body:'Crimson Text','Georgia',serif;--font-ui:'Raleway','Trebuchet MS',sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{background:var(--ink);color:var(--paper);font-family:var(--font-body);font-size:18px;line-height:1.8;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;z-index:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");opacity:.04;pointer-events:none;}
  #embers{position:fixed;inset:0;z-index:0;pointer-events:none;}
  section{position:relative;z-index:1;padding:80px 24px;}
  .inner{max-width:680px;margin:0 auto;}
  #hero{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;flex-direction:column;padding:0 24px;}
  .hero-eyebrow{font-family:var(--font-ui);font-size:11px;font-weight:500;letter-spacing:5px;text-transform:uppercase;color:var(--amber);opacity:0;animation:fadeUp 1s ease 0.3s forwards;margin-bottom:32px;}
  .hero-title{font-family:var(--font-display);font-size:clamp(64px,14vw,120px);font-weight:400;line-height:0.9;letter-spacing:-2px;color:var(--paper);opacity:0;animation:fadeUp 1.2s ease 0.6s forwards;margin-bottom:40px;}
  .hero-title em{font-style:italic;color:var(--amber-l);}
  .hero-divider{width:1px;height:60px;background:linear-gradient(180deg,var(--amber),transparent);margin:0 auto 40px;opacity:0;animation:fadeIn 1s ease 1.4s forwards;}
  .hero-sub{font-family:var(--font-body);font-size:22px;font-style:italic;color:var(--cream);opacity:0;animation:fadeUp 1s ease 1.2s forwards;max-width:480px;line-height:1.6;}
  #letter{background:var(--warm);border-top:1px solid var(--line);border-bottom:1px solid var(--line);}
  .letter-wrap{max-width:640px;margin:0 auto;}
  .letter-header{font-family:var(--font-ui);font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--amber);margin-bottom:48px;}
